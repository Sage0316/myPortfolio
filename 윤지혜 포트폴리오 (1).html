document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv class=\"hero-eyebrow\">Human-Robot Interaction · AI Agent<\u002Fdiv>\n      <h1>윤지혜<\u002Fh1>\n      <div class=\"hero-tagline\">사람의 상태와 맥락을 해석해,<br>AI의 개입 타이밍을 설계하는 HRI / AI Agent 개발자<\u002Fdiv>\n      <p class=\"hero-intro\">상담심리학 석사와 EAP·조직 컨설팅 경력을 바탕으로, 사람의 행동 신호와 상호작용 맥락을 해석하는 역량을 쌓아왔습니다. 현재는 이를 HRI 시스템 설계와 AI Agent 구현으로 확장하며, 사용자가 먼저 입력하지 않아도 적절한 순간에 개입하는 Proactive Interaction 경험을 설계하고 있습니다.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"hero-meta\">\n      <b>Location<\u002Fb><span>Seoul, Korea<\u002Fspan>\n      <b>Phone<\u002Fb><span>010-8001-0316<\u002Fspan>\n      <b>Email<\u002Fb><span><a href=\"mailto:jihyeyun0316@gmail.com\">jihyeyun0316@gmail.com<\u002Fa><\u002Fspan>\n      <b>LinkedIn<\u002Fb><span><a href=\"https://www.linkedin.com/in/jihye-yun-b9a34b128\" target=\"_blank\" rel=\"noopener\">LinkedIn Profile<\u002Fa><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">01<\u002Fspan><span class=\"sec-title\">Profile<\u002Fspan><span class=\"sec-en\">about<\u002Fspan><\u002Fdiv>\n    <div class=\"profile-grid\">\n      <div>\n        <p>공공기관·민간기업 대상 EAP, HRD, 조직문화 프로젝트를 기획·운영하며 사람의 상태 변화와 개입 시점을 해석하는 역량을 축적했습니다. 요구 분석, 프로그램 구조 설계, 이해관계자 조율, 운영 흐름 개선을 반복하며 복잡한 맥락을 구조화하는 방식으로 일해왔습니다.<\u002Fp>\n        <p>현재는 AI Agent Development Bootcamp와 개인·팀 프로젝트를 통해 Python, OpenCV, MediaPipe, LangGraph, FastAPI, Next.js 기반 구현 경험을 확장하고 있습니다. 사용자 이해를 출발점으로 상호작용 구조를 설계하고, 이를 실제 프로토타입과 제품 흐름으로 연결하는 데 강점이 있습니다.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"quote\">사용자가 어떤 순간에 무엇을 필요로 하는지 먼저 파악하고, 그 흐름을 자연스러운 AI 상호작용으로 바꾸는 데 강점이 있습니다.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"tile-parchment\">\n    <div class=\"sec-head\"><span class=\"sec-num\">02<\u002Fspan><span class=\"sec-title\">Technical Skills<\u002Fspan><span class=\"sec-en\">skills<\u002Fspan><\u002Fdiv>\n    <div class=\"skill-grid\">\n      <div class=\"skill-row\"><div class=\"skill-cat\">HRI / Vision<\u002Fdiv><div class=\"skill-items\">OpenCV, MediaPipe, Context Management, HRI Scenario Design, Interaction Timing<\u002Fdiv><\u002Fdiv>\n      <div class=\"skill-row\"><div class=\"skill-cat\">AI Agent<\u002Fdiv><div class=\"skill-items\">LangGraph, LangChain, HITL, Realtime API, Agent Workflow, Prompt Engineering<\u002Fdiv><\u002Fdiv>\n      <div class=\"skill-row\"><div class=\"skill-cat\">Backend<\u002Fdiv><div class=\"skill-items\">Python, FastAPI, PostgreSQL, SQLAlchemy, REST API, PostGIS, pgvector<\u002Fdiv><\u002Fdiv>\n      <div class=\"skill-row\"><div class=\"skill-cat\">Frontend<\u002Fdiv><div class=\"skill-items\">Next.js, React, TypeScript, UI 구조 설계, QA, 상태값 정리<\u002Fdiv><\u002Fdiv>\n      <div class=\"skill-row\"><div class=\"skill-cat\">Research<\u002Fdiv><div class=\"skill-items\">심리 연구 설계, 성과 분석, 심리측정 도구 이해, 문서 구조화<\u002Fdiv><\u002Fdiv>\n      <div class=\"skill-row\"><div class=\"skill-cat\">Collaboration<\u002Fdiv><div class=\"skill-items\">이해관계자 조율, 프로젝트 운영, Git/GitHub, 기술-비기술 커뮤니케이션<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section>\n    <div class=\"sec-head\"><span class=\"sec-num\">03<\u002Fspan><span class=\"sec-title\">Projects<\u002Fspan><span class=\"sec-en\">portfolio · accordion<\u002Fspan><\u002Fdiv>\n\n    <div class=\"proj\" data-proj=\"\">\n      <div class=\"proj-head\">\n        <span class=\"proj-tag\">Personal<\u002Fspan>\n        <div class=\"proj-title-wrap\">\n          <div class=\"proj-name\">EIRA — Physical AI Companion<\u002Fdiv>\n          <div class=\"proj-oneliner\">사용자의 입력 이전에 상태 신호를 해석해 먼저 상호작용을 시작하는 Proactive HRI 시스템<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"proj-toggle\">+<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-body\"><div class=\"proj-inner\">\n        <div class=\"lead\">EIRA는 자세·시선·움직임 등 관찰 가능한 물리적 신호를 해석해, 사용자가 먼저 말을 걸지 않아도 적절한 순간에 AI가 먼저 상호작용을 시작하는 Physical AI Companion 프로젝트입니다.<\u002Fdiv>\n        <div class=\"proj-grid\">\n          <div>\n            <div class=\"proj-block\"><h4>Role<\u002Fh4><ul>\n              <li>HRI 시나리오 설계<\u002Fli>\n              <li>Vision Input 파이프라인 구현<\u002Fli>\n              <li>Context 흐름 설계<\u002Fli>\n              <li>Interaction Decision 로직 설계<\u002Fli>\n            <\u002Ful><\u002Fdiv>\n            <div class=\"proj-block\"><h4>What I Built<\u002Fh4><ul>\n              <li>OpenCV·MediaPipe 기반 얼굴 방향, 상반신 자세, 움직임 변화 감지 파이프라인 구현<\u002Fli>\n              <li>단발 신호가 아닌 흐름 기반 판단을 위한 Context Manager 구조 설계<\u002Fli>\n              <li>피로·집중·이탈 상태 구분 기준 정의<\u002Fli>\n              <li>개입 타이밍 로직 설계 및 Realtime API 연동 구조 정리<\u002Fli>\n            <\u002Ful><\u002Fdiv>\n            <div class=\"proj-block\"><h4>Tech Stack<\u002Fh4><div class=\"stack-chips\"><span class=\"chip\">Python<\u002Fspan><span class=\"chip\">OpenCV<\u002Fspan><span class=\"chip\">MediaPipe<\u002Fspan><span class=\"chip\">OpenAI Realtime API<\u002Fspan><span class=\"chip\">HRI Scenario Design<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"proj-block\"><h4>System Flow<\u002Fh4>\n              <div class=\"arch\">\n<svg viewBox=\"0 0 960 720\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Noto Sans CJK KR, Noto Sans KR, Apple SD Gothic Neo, Malgun Gothic, sans-serif\">\n  <defs>\n    <marker id=\"arr\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7\" refY=\"3\" orient=\"auto\" markerUnits=\"strokeWidth\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#6B8080\"><\u002Fpath><\u002Fmarker>\n    <marker id=\"arrTeal\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7\" refY=\"3\" orient=\"auto\" markerUnits=\"strokeWidth\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#1A7A6E\"><\u002Fpath><\u002Fmarker>\n    <filter id=\"shadow\" x=\"-8%\" y=\"-8%\" width=\"116%\" height=\"122%\"><feDropShadow dx=\"0\" dy=\"7\" stdDeviation=\"8\" flood-color=\"#0F2E2E\" flood-opacity=\"0.075\"><\u002FfeDropShadow><\u002Ffilter>\n    <linearGradient id=\"paper\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color= ture · 실시간 프레임 수집<\u002Ftext>\n  <text x=\"78\" y=\"284\" font-size=\"10.3\" fill=\"#6B8080\">웹캠 또는 테스트 영상 소스 연결<\u002Ftext>\n\n  <!-- 02 -->\n  <rect x=\"350\" y=\"188\" width=\"260\" height=\"116\" rx=\"14\" fill=\"url(#teal)\" stroke=\"#1A7A6E\" stroke-width=\"1.35\"><\u002Frect>\n  <circle cx=\"378\" cy=\"216\" r=\"15\" fill=\"#E3F2EF\" opacity=\".22\"><\u002Fcircle>\n  <circle cx=\"373\" cy=\"212\" r=\"2\" fill=\"#DFF2EF\"><\u002Fcircle><circle cx=\"383\" cy=\"212\" r=\"2\" fill=\"#DFF2EF\"><\u002Fcircle><circle cx=\"378\" cy=\"224\" r=\"2\" fill=\"#DFF2EF\"><\u002Fcircle><path d=\"M373 212 L383 212 L378 224 Z\" fill=\"none\" stroke=\"#DFF2EF\" stroke-width=\"1\"><\u002Fpath>\n  <text x=\"404\" y=\"218\" font-size=\"13.5\" font-weight=\"800\" fill=\"#FFFFFF\">MediaPipe 랜드마크<\u002Ftext>\n  <text x=\"404\" y=\"236\" font-size=\"9.2\" fill=\"#BFE0DA\" font-weight=\"700\">FaceMesh + Pose<\u002Ftext>\n  <text x=\"372\" y=\"260\" font-size=\"10.3\" fill=\"#E3F2EF\">FaceMesh 478개 좌표 · Pose 33개 좌표<\u002Ftext>\n  <text x=\"372\" y=\"276\" font-size=\"10.3\" fill=\"#E3F2EF\">extract_landmarks.py<\u002Ftext>\n  <text x=\"372\" y=\"292\" font-size=\"10.3\" fill=\"#BFE0DA\">extract_pose_landmarks.py<\u002Ftext>\n\n  <!-- 03 -->\n  <rect x=\"660\" y=\"198\" width=\"240\" height=\"96\" rx=\"14\" fill=\"url(#mint)\" stroke=\"#1A7A6E\" stroke-width=\"1.35\"><\u002Frect>\n  <rect x=\"682\" y=\"220\" width=\"30\" height=\"24\" rx=\"5\" fill=\"#FFFFFF\" stroke=\"#9FC4BE\"><\u002Frect><line x1=\"688\" y1=\"228\" x2=\"706\" y2=\"228\" stroke=\"#1A7A6E\" stroke-width=\"1.1\"><\u002Fline><line x1=\"688\" y1=\"235\" x2=\"706\" y2=\"235\" stroke=\"#1A7A6E\" stroke-width=\"1.1\"><\u002Fline>\n  <text x=\"724\" y=\"226\" font-size=\"13.5\" font-weight=\"800\" fill=\"#0F2E2E\">CSV 좌표 저장<\u002Ftext>\n  <text x=\"724\" y=\"244\" font-size=\"9.2\" fill=\"#1A7A6E\" font-weight=\"700\">data/*.csv<\u002Ftext>\n  <text x=\"682\" y=\"268\" font-size=\"10.3\" fill=\"#1A7A6E\">프레임별 landmark 좌표 기록<\u002Ftext>\n  <text x=\"682\" y=\"284\" font-size=\"10.3\" fill=\"#6B8080\">추후 분석/임계값 조정용 데이터<\u002Ftext>\n\n  <!-- 04 -->\n  <rect x=\"660\" y=\"322\" width=\"240\" height=\"96\" rx=\"14\" fill=\"url(#mint)\" stroke=\"#1A7A6E\" stroke-width=\"1.35\"><\u002Frect>\n  <text x=\"682\" y=\"350\" font-size=\"13.5\" font-weight=\"800\" fill=\"#0F2E2E\">Pandas 특징 집계<\u002Ftext>\n  <text x=\"682\" y=\"368\" font-size=\"9.2\" fill=\"#1A7A6E\" font-weight=\"700\">summarize_pose_metrics.py<\u002Ftext>\n  <text x=\"682\" y=\"392\" font-size=\"10.3\" fill=\"#1A7A6E\">rolling window · baseline 보정<\u002Ftext>\n  <text x=\"682\" y=\"408\" font-size=\"10.3\" fill=\"#6B8080\">눈/입/눈썹/고개/어깨 지표 생성<\u002Ftext>\n\n  <!-- 05 -->\n  <rect x=\"350\" y=\"322\" width=\"260\" height=\"96\" rx=\"14\" fill=\"#FFFFFF\" stroke=\"#B8C7C4\" stroke-width=\"1.35\"><\u002Frect>\n  <text x=\"372\" y=\"350\" font-size=\"13.5\" font-weight=\"800\" fill=\"#0F2E2E\">Rule 기반 상태 분류<\u002Ftext>\n  <text x=\"372\" y=\"368\" font-size=\"9.2\" fill=\"#6B8080\" font-weight=\"700\">classify_state.py<\u002Ftext>\n  <text x=\"372\" y=\"392\" font-size=\"10.3\" fill=\"#6B8080\">positive · fatigued · low_mood 신호<\u002Ftext>\n  <text x=\"372\" y=\"408\" font-size=\"10.3\" fill=\"#6B8080\">감정 확정이 아닌 변화 패턴 추정<\u002Ftext>\n\n  <!-- 06 -->\n  <rect x=\"60\" y=\"322\" width=\"240\" height=\"96\" rx=\"14\" fill=\"#FFFFFF\" stroke=\"#B8C7C4\" stroke-width=\"1.35\"><\u002Frect>\n  <text x=\"82\" y=\"350\" font-size=\"13.5\" font-weight=\"800\" fill=\"#0F2E2E\">Signal Guard<\u002Ftext>\n  <text x=\"82\" y=\"368\" font-size=\"9.2\" fill=\"#6B8080\" font-weight=\"700\">stability logic<\u002Ftext>\n  <text x=\"82\" y=\"392\" font-size=\"10.3\" fill=\"#6B8080\">깜빡임 방지 · 상태 유지<\u002Ftext>\n  <text x=\"82\" y=\"408\" font-size=\"10.3\" fill=\"#6B8080\">확신 낮은 프레임은 출력 억제<\u002Ftext>\n\n  <!-- 07/08 output -->\n  <rect x=\"330\" y=\"454\" width=\"200\" height=\"92\" rx=\"14\" fill=\"#FFF7E6\" stroke=\"#E3B963\" stroke-width=\"1.35\"><\u002Frect>\n  <text x=\"352\" y=\"483\" font-size=\"13.5\" font-weight=\"800\" fill=\"#0F2E2E\">demo_ui 출력<\u002Ftext>\n  <text x=\"352\" y=\"501\" font-size=\"9.2\" fill=\"#9A6A00\" font-weight=\"700\">Tkinter · PIL · assets<\u002Ftext>\n  <text x=\"352\" y=\"525\" font-size=\"10.3\" fill=\"#6B8080\">캐릭터 얼굴/입 이미지 합성<\u002Ftext>\n  <text x=\"352\" y=\"541\" font-size=\"10.3\" fill=\"#6B8080\">상태 문구 실시간 표시<\u002Ftext>\n\n  <rect x=\"590\" y=\"454\" width=\"250\" height=\"92\" rx=\"14\" fill=\"#FFF7E6\" stroke=\"#E3B963\" stroke-width=\"1.35\"><\u002Frect>\n  <text x=\"612\" y=\"483\" font-size=\"13.5\" font-weight=\"800\" fill=\"#0F2E2E\">선제 상호작용<\u002Ftext>\n  <text x=\"612\" y=\"501\" font-size=\"9.2\" fill=\"#9A6A00\" font-weight=\"700\">Proactive prompt<\u002Ftext>\n  <text x=\"612\" y=\"525\" font-size=\"10.3\" fill=\"#6B8080\">“조금 지쳐 보여요”처럼 질문형 반응<\u002Ftext>\n  <text x=\"612\" y=\"541\" font-size=\"10.3\" fill=\"#6B8080\">사용자 입력을 기다리지 않는 AI 경험<\u002Ftext>\n\n  <!-- bottom strip -->\n  <rect x=\"60\" y=\"588\" width=\"840\" height=\"50\" rx=\"12\" fill=\"#F4F7F6\" stroke=\"#D5E2E0\"><\u002Frect>\n  <text x=\"82\" y=\"610\" font-size=\"11.3\" fill=\"#0F2E2E\" font-weight=\"800\">Offline Test Loop<\u002Ftext>\n  <text x=\"82\" y=\"628\" font-size=\"10\" fill=\"#6B8080\">MOV 샘플 영상 → landmark CSV → pose metrics → rule tuning → 실시간 웹캠 데모 반영<\u002Ftext>\n  <text x=\"878\" y=\"620\" font-size=\"10\" fill=\"#1A7A6E\" font-weight=\"700\" text-anchor=\"end\">Python · OpenCV · MediaPipe · Pandas · Tkinter/PIL<\u002Ftext>\n\n  <text x=\"480\" y=\"670\" font-size=\"10.8\" fill=\"#1A7A6E\" font-weight=\"700\" text-anchor=\"middle\">EIRA Core: 관찰 신호 기반으로 사용자가 먼저 입력하지 않아도 조심스럽게 다가오는 Physical AI Interaction<\u002Ftext>\n<\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"proj\" data-proj=\"\">\n      <div class=\"proj-head\">\n        <span class=\"proj-tag\">Team<\u002Fspan>\n        <div class=\"proj-title-wrap\">\n          <div class=\"proj-name\">KIRA — ESG Supply Chain AI Platform<\u002Fdiv>\n          <div class=\"proj-oneliner\">EV 배터리 공급망 실사, 규제 검토, DPP 발행을 지원하는 LangGraph 기반 AI Agent 플랫폼<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"proj-toggle\">+<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-body\"><div class=\"proj-inner\">\n        <div class=\"lead\">KIRA는 EV 배터리 공급망 실사와 규제 검토, DPP 발행을 지원하는 AI Agent 플랫폼입니다. 제품 중심 공급망 구조 재설계, HITL 분기 흐름 설계, Audit 백엔드 개발, 프론트엔드 재구성까지 수행한 팀 프로젝트입니다.<\u002Fdiv>\n        <div class=\"proj-grid\">\n          <div>\n            <div class=\"proj-block\"><h4>Role<\u002Fh4><ul>\n              <li>IA 설계<\u002Fli>\n              <li>Audit 도메인 백엔드 개발<\u002Fli>\n              <li>프론트엔드 재구성<\u002Fli>\n              <li>Agent 흐름 검증, QA 및 배포 수행<\u002Fli>\n            <\u002Ful><\u002Fdiv>\n            <div class=\"proj-block\"><h4>What I Built<\u002Fh4><ul>\n              <li>협력사 중심 구조를 제품 중심 공급망 구조로 재설계<\u002Fli>\n              <li>7-tier 공급망 매핑 및 규제 검토 흐름 연결<\u002Fli>\n              <li>확신이 낮은 판정의 HITL 검토 분기 구조 설계<\u002Fli>\n              <li>PostGIS 기반 geo_audit 기능 구현<\u002Fli>\n              <li>Audit, User, Report, Batch 도메인 FastAPI 백엔드 개발<\u002Fli>\n            <\u002Ful><\u002Fdiv>\n            <div class=\"proj-block\"><h4>Tech Stack<\u002Fh4><div class=\"stack-chips\"><span class=\"chip\">FastAPI<\u002Fspan><span class=\"chip\">LangGraph<\u002Fspan><span class=\"chip\">PostgreSQL<\u002Fspan><span class=\"chip\">PostGIS<\u002Fspan><span class=\"chip\">pgvector<\u002Fspan><span class=\"chip\">Next.js<\u002Fspan><span class=\"chip\">AWS<\u002Fspan><span class=\"chip\">Docker<\u002Fspan><span class=\"chip\">Vercel<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"proj-block\"><h4>Agent Pipeline<\u002Fh4>\n              <div class=\"arch\">\n<svg viewBox=\"0 0 720 560\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Noto Sans CJK KR, Noto Sans KR, sans-serif\">\n      <defs>\n        <marker id=\"arr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\">\n          <path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#6B8080\"><\u002Fpath>\n        <\u002Fmarker>\n      <\u002Fdefs>\n\n      <!-- legend -->\n      <rect x=\"20\" y=\"16\" width=\"14\" height=\"14\" rx=\"3\" fill=\"#1A7A6E\"><\u002Frect>\n      <text x=\"40\" y=\"28\" font-size=\"10\" fill=\"#233838\">AI 사용<\u002Ftext>\n      <rect x=\"104\" y=\"16\" width=\"14\" height=\"14\" rx=\"3\" fill=\"#FFFFFF\" stroke=\"#B8C7C4\" stroke-width=\"1.3\"><\u002Frect>\n      <text x=\"124\" y=\"28\" font-size=\"10\" fill=\"#233838\">결정론 · 규칙 기반<\u002Ftext>\n      <rect x=\"232\" y=\"16\" width=\"14\" height=\"14\" rx=\"3\" fill=\"#FFF7E6\" stroke=\"#E3B963\" stroke-width=\"1.3\"><\u002Frect>\n      <text x=\"252\" y=\"28\" font-size=\"10\" fill=\"#233838\">HITL · 담당자 검토<\u002Ftext>\n      <text x=\"700\" y=\"28\" font-size=\"9.5\" fill=\"#1A7A6E\" text-anchor=\"end\" font-weight=\"600\">KIRA 내부 ESG 공급망 추적·검증 흐름<\u002Ftext>\n\n      <!-- start -->\n      <rect x=\"20\" y=\"46\" width=\"680\" height=\"50\" rx=\"9\" fill=\"#F4F7F6\" stroke=\"#D5E2E0\"><\u002Frect>\n      <text x=\"36\" y=\"66\" font-size=\"11.5\" font-weight=\"700\" fill=\"#0F2E2E\">KIRA 제품 M-BOM 기준 설정<\u002Ftext>\n      <text x=\"36\" y=\"82\" font-size=\"9\" fill=\"#6B8080\">배터리 완성품 → 부품 · 자재 · 원재료 추적 기준 정의<\u002Ftext>\n\n      <!-- supplier input -->\n      <line x1=\"360\" y1=\"96\" x2=\"360\" y2=\"114\" stroke=\"#6B8080\" stroke-width=\"1.4\" marker-end=\"url(#arr)\"><\u002Fline>\n      <rect x=\"80\" y=\"114\" width=\"560\" height=\"54\" rx=\"9\" fill=\"#FFFFFF\" stroke=\"#B8C7C4\" stroke-width=\"1.3\"><\u002Frect>\n      <text x=\"98\" y=\"135\" font-size=\"11.5\" font-weight=\"700\" fill=\"#0F2E2E\">협력사 공급망 데이터 제출<\u002Ftext>\n      <text x=\"600\" y=\"135\" font-size=\"8.8\" fill=\"#6B8080\" text-anchor=\"end\">Supplier Input<\u002Ftext>\n      <text x=\"98\" y=\"153\" font-size=\"9\" fill=\"#6B8080\">납품 품목 · 생산 사업장 · 하위 자재 · 하위 협력사 · 원산지 · 증빙자료<\u002Ftext>\n\n      <!-- n-tier trace -->\n      <line x1=\"360\" y1=\"168\" x2=\"360\" y2=\"186\" stroke=\"#6B8080\" stroke-width=\"1.4\" marker-end=\"url(#arr)\"><\u002Fline>\n      <rect x=\"80\" y=\"186\" width=\"560\" height=\"54\" rx=\"9\" fill=\"#EAF4F2\" stroke=\"#1A7A6E\" stroke-width=\"1.2\"><\u002Frect>\n      <text x=\"98\" y=\"207\" font-size=\"11.5\" font-weight=\"700\" fill=\"#0F2E2E\">N차 공급망 맵 확장<\u002Ftext>\n      <text x=\"600\" y=\"207\" font-size=\"8.8\" fill=\"#1A7A6E\" text-anchor=\"end\">Traceability<\u002Ftext>\n      <text x=\"98\" y=\"225\" font-size=\"9\" fill=\"#1A7A6E\">상위 협력사가 하위 협력사를 호출하며 자재-공급사-사업장 관계를 단계적으로 연결<\u002Ftext>\n\n      <!-- document ai -->\n      <line x1=\"360\" y1=\"240\" x2=\"360\" y2=\"258\" stroke=\"#6B8080\" stroke-width=\"1.4\" marker-end=\"url(#arr)\"><\u002Fline>\n      <rect x=\"120\" y=\"258\" width=\"480\" height=\"62\" rx=\"9\" fill=\"#1A7A6E\"><\u002Frect>\n      <text x=\"138\" y=\"279\" font-size=\"11.5\" font-weight=\"700\" fill=\"#FFFFFF\">data_gateway · 증빙자료 추출<\u002Ftext>\n      <text x=\"560\" y=\"279\" font-size=\"8.8\" fill=\"#BFE0DA\" text-anchor=\"end\">AI · Bedrock<\u002Ftext>\n      <text x=\"138\" y=\"297\" font-size=\"9\" fill=\"#E3F2EF\">Claude 멀티모달 추출 — PDF/이미지/엑셀 → structured JSON<\u002Ftext>\n      <text x=\"138\" y=\"312\" font-size=\"9\" fill=\"#9FC4BE\">parsed_fields · confidence_map · evidence_metadata 생성<\u002Ftext>\n\n      <!-- DB -->\n      <line x1=\"360\" y1=\"320\" x2=\"360\" y2=\"338\" stroke=\"#6B8080\" stroke-width=\"1.4\" marker-end=\"url(#arr)\"><\u002Fline>\n      <rect x=\"20\" y=\"338\" width=\"680\" height=\"42\" rx=\"9\" fill=\"#EAF4F2\" stroke=\"#1A7A6E\" stroke-width=\"1.2\"><\u002Frect>\n      <text x=\"36\" y=\"358\" font-size=\"11\" font-weight=\"700\" fill=\"#0F2E2E\">PostgreSQL · PostGIS · pgvector<\u002Ftext>\n      <text x=\"36\" y=\"373\" font-size=\"8.8\" fill=\"#1A7A6E\">공급망 관계 · 사업장 위치 · 규제 근거 · 문서 -weight=\"700\" fill=\"#FFFFFF\">compliance<\u002Ftext>\n      <text x=\"452\" y=\"493\" font-size=\"8.5\" fill=\"#BFE0DA\" text-anchor=\"end\">AI · RAG<\u002Ftext>\n      <text x=\"268\" y=\"511\" font-size=\"8.8\" fill=\"#E3F2EF\">규제 문서 검색 + 근거 조항 대조<\u002Ftext>\n      <text x=\"268\" y=\"525\" font-size=\"8.8\" fill=\"#E3F2EF\">FEOC · UFLPA 등 리스크 판정<\u002Ftext>\n\n      <rect x=\"484\" y=\"472\" width=\"216\" height=\"64\" rx=\"9\" fill=\"#FFFFFF\" stroke=\"#B8C7C4\" stroke-width=\"1.3\"><\u002Frect>\n      <text x=\"500\" y=\"493\" font-size=\"10.5\" font-weight=\"700\" fill=\"#0F2E2E\">risk_scoring<\u002Ftext>\n      <text x=\"684\" y=\"493\" font-size=\"8.5\" fill=\"#6B8080\" text-anchor=\"end\">Rule<\u002Ftext>\n      <text x=\"500\" y=\"511\" font-size=\"8.8\" fill=\"#6B8080\">규제 위반 · 지역 리스크 · 경고<\u002Ftext>\n      <text x=\"500\" y=\"525\" font-size=\"8.8\" fill=\"#6B8080\">점수화 후 risk_level 산정<\u002Ftext>\n\n      <!-- bottom output -->\n      <line x1=\"128\" y1=\"536\" x2=\"128\" y2=\"548\" stroke=\"#6B8080\" stroke-width=\"1.2\"><\u002Fline>\n      <line x1=\"360\" y1=\"536\" x2=\"360\" y2=\"548\" stroke=\"#6B8080\" stroke-width=\"1.2\"><\u002Fline>\n      <line x1=\"592\" y1=\"536\" x2=\"592\" y2=\"548\" stroke=\"#6B8080\" stroke-width=\"1.2\"><\u002Fline>\n      <line x1=\"128\" y1=\"548\" x2=\"592\" y2=\"548\" stroke=\"#6B8080\" stroke-width=\"1.2\"><\u002Fline>\n      <line x1=\"360\" y1=\"548\" x2=\"360\" y2=\"560\" stroke=\"#6B8080\" stroke-width=\"1.2\"><\u002Fline>\n    <\u002Fsvg>\n\n    <svg viewBox=\"0 0 720 132\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Noto Sans CJK KR, Noto Sans KR, sans-serif\">\n      <defs>\n        <marker id=\"arr2\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\">\n          <path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#6B8080\"><\u002Fpath>\n        <\u002Fmarker>\n      <\u002Fdefs>\n\n      <line x1=\"360\" y1=\"0\" x2=\"360\" y2=\"16\" stroke=\"#6B8080\" stroke-width=\"1.4\" marker-end=     <div class=\"tl-item\">\n      <div class=\"tl-date\">2025.11 – 2025.12<\u002Fdiv>\n      <div class=\"tl-body\">\n        <h3>홈플러스<\u002Fh3>\n        <div class=\"tl-role\">이커머스 · 선임 프리랜서<\u002Fdiv>\n        <ul>\n          <li>이커머스 운영 및 사업 관련 단기 프로젝트 수행<\u002Fli>\n          <li>운영 프로세스 지원 및 실무 자료 정리<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">2025.09<\u002Fdiv>\n      <div class=\"tl-body\">\n        <h3>에스넷<\u002Fh3>\n        <div class=\"tl-role\">교육운영팀 · 과장 프리랜서<\u002Fdiv>\n        <ul>\n          <li>교육 운영, 제안서 기획, 사업 문서 구조화 수행<\u002Fli>\n          <li>이해관계자 커뮤니케이션 지원<\u002Fli>\n          <li>군 전역 예정 장병 대상 신규 이러닝 사업 제안의 핵심 기획 및 문서화 기여<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">2020.01 – 2024.10<\u002Fdiv>\n      <div class=\"tl-body\">\n        <h3>다인<\u002Fh3>\n        <div class=\"tl-role\">EAP 사업팀 · 수석 컨설턴트<\u002Fdiv>\n        <ul>\n          <li>공공기관·민간기업 대상 EAP, HRD, 조직문화 프로젝트 기획 및 운영<\u002Fli>\n          <li>조직 진단, 리더십, 갈등관리, 임직원 지원 프로그램 설계<\u002Fli>\n          <li>이해관계자 요구 분석, 프로그램 구조 설계, 운영 흐름 설계<\u002Fli>\n          <li>성과 분석, 보고서 작성, 문서 구조화 수행<\u002Fli>\n          <li>해양경찰청, 대법원, 기업은행, GS칼텍스 등 다수 기업 제안서 작성<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">2019.02 – 2019.12<\u002Fdiv>\n      <div class=\"tl-body\">\n        <h3>기독교세계관학술동역회<\u002Fh3>\n        <div class=\"tl-role\">간사<\u002Fdiv>\n        <ul>\n          <li>학술지·격월간지 발간 지원<\u002Fli>\n          <li>학술대회 기획·운영, 행사 홍보 및 커뮤니케이션 지원<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  \n  <section style=\"padding-bottom:24px;\">\n    <div class=\"sec-head\"><span class=\"sec-num\">05<\u002Fspan><span class=\"sec-title\">Background<\u002Fspan><span class=\"sec-en\">education<\u002Fspan><\u002Fdiv>\n    <div class=\"background-flow\">\n\n      <div class=\"bg-group\">\n        <div class=\"bg-heading\">Education<\u002Fdiv>\n        <div class=\"bg-list\">\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>한동대학교 일반대학원 심리학과 · 석사<\u002Fspan>\n              <span class=\"bg-item-meta\">2016.09 – 2019.02<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>한동대학교 상담심리사회복지학부 · 학사<\u002Fspan>\n              <span class=\"bg-item-meta\">2010.03 – 2016.07<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bg-group\">\n        <div class=\"bg-heading\">Graduate Research<\u002Fdiv>\n        <div class=\"bg-sub\">대학원 과정 중 수행 및 참여 연구<\u002Fdiv>\n        <div class=\"bg-list\">\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>여성의 자아존중감이 음식중독에 미치는 영향: 스트레스의 매개효과<\u002Fspan>\n              <span class=\"bg-item-meta\">Thesis<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>예일음식중독척도 2.0(Yale Food Addiction Scale 2.0) 국내 타당화 연구<\u002Fspan>\n              <span class=\"bg-item-meta\">Research<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>청소년 인터넷·스마트폰 과의존 상담·치유 프로그램 성과분석 및 평가지표 개발<\u002Fspan>\n              <span class=\"bg-item-meta\">Research<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>스마트폰 선용 역량 구축 모델 개발<\u002Fspan>\n              <span class=\"bg-item-meta\">Research<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bg-group\">\n        <div class=\"bg-heading\">AI Agent Development Bootcamp<\u002Fdiv>\n        <div class=\"bg-sub\">1,040 Hours · Full-Stack / AI Agent / Cloud &amp; DevOps / ESG Domain<\u002Fdiv>\n        <div class=\"bg-list\">\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>Full-Stack · React · Next.js · Python · FastAPI · Database<\u002Fspan>\n              <span class=\"bg-item-meta\">Bootcamp<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>AI Agent Engineering · LLM · LangChain · LangGraph · RAG<\u002Fspan>\n              <span class=\"bg-item-meta\">Bootcamp<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>Cloud &amp; DevOps · AWS · Docker · Kubernetes · CI/CD<\u002Fspan>\n              <span class=\"bg-item-meta\">Bootcamp<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>ESG Domain · Supply Chain ESG · Carbon Emissions · CBAM · ESG Data Analytics<\u002Fspan>\n              <span class=\"bg-item-meta\">Bootcamp<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bg-group\">\n        <div class=\"bg-heading\">Certificates<\u002Fdiv>\n        <div class=\"bg-list\">\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>전문상담사 2급<\u002Fspan>\n              <span class=\"bg-item-meta\">2020.01<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-item\">\n            <div class=\"bg-item-title\">\n              <span>TOEIC Speaking IH<\u002Fspan>\n              <span class=\"bg-item-meta\">2025.06<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n\n  <section class=\"tile-parchment\">\n    <div class=\"sec-head\"><span class=\"sec-num\">06<\u002Fspan><span class=\"sec-title\">자기소개서<\u002Fspan><span class=\"sec-en\">cover letter<\u002Fspan><\u002Fdiv>\n\n    <div class=\"proj\" data-proj=\"\">\n      <div class=\"proj-head\">\n        <span class=\"proj-tag\">01<\u002Fspan>\n        <div class=\"proj-title-wrap\"><div class=\"proj-name\">직무 전환 계기<\u002Fdiv><\u002Fdiv>\n        <div class=\"proj-toggle\">+<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-body\"><div class=\"proj-inner\">\n        <p style=\"font-size:12pt;color:var(--ink-soft);line-height:1.8;font-weight:400;\">사람의 마음과 조직의 변화를 함께 이해하고 싶다는 관심은 학부에서 상담심리학과 사회복지학을 복수전공하고, 이후 대학원에서 심리학을 전공하는 과정으로 이어졌습니다. 개인의 심리와 관계를 이해하는 공부를 하면서도, 실제 현장에서는 개인만이 아니라 조직과 시스템이 함께 바뀌어야 지속적인 변화가 가능하다는 점을 체감했습니다. 이러한 관심은 이후 공공기관과 민간기업을 대상으로 EAP, 조직문화, 교육 프로그램을 기획·운영하는 커리어로 확장되었습니다. 최근에는 사람 중심 관점을 기술과 연결하는 일에 관심을 두며 AI Agent와 HRI 분야를 학습하고 있습니다. 사람을 이해하는 기반 위에서 기술을 설계하는 것이 저의 커리어를 관통하는 핵심 가치입니다.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"proj\" data-proj=\"\">\n      <div class=\"proj-head\">\n        <span class=\"proj-tag\">02<\u002Fspan>\n        <div class=\"proj-title-wrap\"><div class=\"proj-name\">갈등 해결 경험<\u002Fdiv><\u002Fdiv>\n        <div class=\"proj-toggle\">+<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-body\"><div class=\"proj-inner\">\n        <p style=\"font-size:12pt;color:var(--ink-soft);line-height:1.8;font-weight:400;\">프로젝트를 운영하다 보면 고객사, 내부 실무진, 외부 강사 및 상담사 간 요구사항이 서로 다른 경우가 많았습니다. 저는 먼저 각 이해관계자의 입장을 분리해서 정리하고, 무엇이 반드시 충족되어야 하는 핵심 조건인지 우선순위를 재설정하는 방식으로 갈등을 해결해왔습니다. 예를 들어 일정, 예산, 운영 방식에서 의견 차이가 발생했을 때 각자의 요구를 그대로 전달하는 데 그치지 않고, 공통 목표를 기준으로 조율 가능한 대안을 제시했습니다. 그 결과 일정 변경이나 운영 수정이 필요한 상황에서도 프로젝트가 중단 없이 진행될 수 있었고, 고객사의 신뢰를 유지할 수 있었습니다. 이 경험을 통해 갈등은 피하는 대상이 아니라 구조화하고 조정해야 하는 문제라는 점을 배웠습니다.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"proj\" data-proj=\"\">\n      <div class=\"proj-head\">\n        <span class=\"proj-tag\">03<\u002Fspan>\n        <div class=\"proj-title-wrap\"><div class=\"proj-name\">핵심역량을 통한 직무 수행<\u002Fdiv><\u002Fdiv>\n        <div class=\"proj-toggle\">+<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-body\"><div class=\"proj-inner\">\n        <p style=\"font-size:12pt;color:var(--ink-soft);line-height:1.8;font-weight:400;\">약 5년간 공공기관 및 민간기업 대상 EAP, HRD, 조직문화 프로젝트를 수행하며 고객사의 조직 이슈와 요구를 분석하고, 이를 제안서, 프로그램 기획, 운영 구조, 성과 개선 방향으로 구체화해왔습니다. 단순한 요청 수행에 그치지 않고 고객사가 실제로 해결하고자 하는 문제와 현장의 제약을 함께 파악하며, 다양한 이해관계자를 조율해 실행 가능한 해결안을 만드는 경험을 쌓았습니다. 최근에는 AI Agent Bootcamp와 ESG 공급망 프로젝트를 통해 이러한 역량을 기술 기반 프로젝트로 확장하고 있으며, 복잡한 도메인과 업무 흐름을 사용자가 이해하기 쉬운 IA/UX 구조로 설계하고 구현하는 경험을 했습니다. 이처럼 저는 고객사와 사용자의 니즈를 정확히 읽고, 이를 실행 가능한 서비스 구조와 결과물로 연결하는 데 강점이 있습니다.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"proj\" data-proj=\"\">\n      <div class=\"proj-head\">\n        <span class=\"proj-tag\">04<\u002Fspan>\n        <div class=\"proj-title-wrap\"><div class=\"proj-name\">문제 해결 경험<\u002Fdiv><\u002Fdiv>\n        <div class=\"proj-toggle\">+<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-body\"><div class=\"proj-inner\">\n        <p style=\"font-size:12pt;color:var(--ink-soft);line-height:1.8;font-weight:400;\">ESG 공급망 프로젝트에서 가장 큰 문제는 복잡한 공급망 구조와 업무 흐름이 사용자에게 직관적으로 보이지 않는다는 점이었습니다. 저는 실제 담당자의 업무 시나리오를 다시 정의하고, 제품 중심으로 정보 구조를 재배치해 공급망 맵과 My Task 화면의 IA/UX 흐름을 재설계했습니다. 또한 통합 작업 큐 조회 API, audit trail 검증, HITL 재개 흐름 등 백엔드 기능과 화면 요구사항이 맞물리도록 상태값과 데이터 흐름을 정리했으며, Tenant·User 중복 정의와 Product ORM 에러 등 도메인 정합성 문제도 발견해 수정 방향을 잡았습니다. 이를 통해 복잡한 도메인을 사용자가 이해하고 처리할 수 있는 업무 흐름으로 재구성했고, 기술 구현은 사용자 문제를 정확히 분석해 서비스 구조와 연결될 때 더 큰 문제 해결로 이어진다는 점을 배웠습니다.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"proj\" data-proj=\"\">\n      <div class=\"proj-head\">\n        <span class=\"proj-tag\">05<\u002Fspan>\n        <div class=\"proj-title-wrap\"><div class=\"proj-name\">지원 동기 및 입사 후 포부<\u002Fdiv><\u002Fdiv>\n        <div class=\"proj-toggle\">+<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-body\"><div class=\"proj-inner\">\n        <p style=\"font-size:12pt;color:var(--ink-soft);line-height:1.8;font-weight:400;\">저는 사람에 대한 이해를 기반으로 기술을 설계하는 일에 큰 매력을 느끼고 있습니다. 기존 커리어에서 조직과 구성원의 문제를 진단하고, 이를 프로그램과 구조로 설계하는 경험을 해왔다면, 앞으로는 이를 AI Agent와 HRI, 사용자 중심 서비스 설계 영역으로 확장하고 싶습니다. 특히 사람의 상태와 맥락을 이해하고 반응하는 인터랙션 설계, 복잡한 문제를 구조화하는 능력, 실제 사용 흐름을 반영한 서비스 설계 역량을 함께 발전시키고자 합니다. 입사 후에는 먼저 조직과 서비스의 문제를 빠르게 이해하고, 사용자 관점에서 구조를 정리하며, 필요한 기술 역량을 빠르게 흡수하는 구성원이 되고 싶습니다. 장기적으로는 사람 중심 AI 경험을 설계하는 HRI/AI Agent 전문가로 성장하고 싶습니다.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"tile-parchment\" style=\"text-align:center;color:var(--gray);font-size:12px;padding-top:38px;padding-bottom:54px;\">윤지혜 · HRI / AI Agent Resume<\u002Ffooter>\n<\u002Fdiv>\n\n<script>\n  document.querySelectorAll('[data-proj]').forEach((proj) => {\n    const head = proj.querySelector('.proj-head');\n    head.addEventListener('click', () => proj.classList.toggle('open'));\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
